<!doctype html>
<!-- @dsCard group="Brand" name="Secondary colors" subtitle="Violet, Purple, Aqua, Teal — one per layout" viewport="700x220" --><html><head><meta charset="utf-8"><title>Secondary Colors</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0;gap:0">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);height:220px">
    <div style="background:#CB65FF;color:#182D43;padding:18px;display:flex;flex-direction:column;justify-content:space-between">
      <span style="font:700 10px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase">Secondary</span>
      <div>
        <div style="font:700 22px/1 var(--font-sans);letter-spacing:-.02em">Lavender</div>
        <div style="font:500 11px/1.4 var(--font-mono);opacity:.8;margin-top:4px">#CB65FF</div>
      </div>
    </div>
    <div style="background:#6103B9;color:var(--tha-white);padding:18px;display:flex;flex-direction:column;justify-content:space-between">
      <span style="font:700 10px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:#CB65FF">Secondary</span>
      <div>
        <div style="font:700 22px/1 var(--font-sans);letter-spacing:-.02em">Purple</div>
        <div style="font:500 11px/1.4 var(--font-mono);opacity:.85;margin-top:4px">#6103B9</div>
      </div>
    </div>
    <div style="background:#86FFF1;color:#182D43;padding:18px;display:flex;flex-direction:column;justify-content:space-between">
      <span style="font:700 10px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase">Secondary</span>
      <div>
        <div style="font:700 22px/1 var(--font-sans);letter-spacing:-.02em">Cyan</div>
        <div style="font:500 11px/1.4 var(--font-mono);opacity:.8;margin-top:4px">#86FFF1</div>
      </div>
    </div>
    <div style="background:#145F7B;color:var(--tha-white);padding:18px;display:flex;flex-direction:column;justify-content:space-between">
      <span style="font:700 10px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:#86FFF1">Secondary</span>
      <div>
        <div style="font:700 22px/1 var(--font-sans);letter-spacing:-.02em">Teal</div>
        <div style="font:500 11px/1.4 var(--font-mono);opacity:.85;margin-top:4px">#145F7B</div>
      </div>
    </div>
  </div>
</div>
</body></html>
