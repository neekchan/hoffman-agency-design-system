<!doctype html>
<!-- @dsCard group="Brand" name="Logo — horizontal" subtitle="On paper / on navy" viewport="700x220" --><html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:0;padding:0">
  <div style="display:grid;grid-template-columns:repeat(3,1fr)">
    <div style="background:#FAFAF7;padding:24px;display:flex;align-items:center;justify-content:center;min-height:160px;border-right:1px solid #E4E9EF">
      <img src="../assets/logo-horizontal-navy-lime.svg" style="max-width:90%;max-height:96px;display:block">
    </div>
    <div style="background:#FAFAF7;padding:24px;display:flex;align-items:center;justify-content:center;min-height:160px;border-right:1px solid #E4E9EF">
      <img src="../assets/logo-horizontal-navy.svg" style="max-width:90%;max-height:96px;display:block">
    </div>
    <div style="background:#FAFAF7;padding:24px;display:flex;align-items:center;justify-content:center;min-height:160px">
      <img src="../assets/logo-horizontal-black.svg" style="max-width:90%;max-height:96px;display:block">
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr)">
    <div style="background:#182D43;padding:24px;display:flex;align-items:center;justify-content:center;min-height:160px">
      <img src="../assets/logo-horizontal-white-lime.svg" style="max-width:90%;max-height:96px;display:block">
    </div>
    <div style="background:#182D43;padding:24px;display:flex;align-items:center;justify-content:center;min-height:160px">
      <img src="../assets/logo-horizontal-white.svg" style="max-width:90%;max-height:96px;display:block">
    </div>
  </div>
  <div style="padding:14px 24px;display:grid;grid-template-columns:repeat(3,1fr);font:500 11px/1.3 var(--font-mono);color:var(--fg-2);gap:10px">
    <span>2-color &middot; navy + lime</span><span>1-color &middot; navy</span><span>1-color &middot; black</span>
  </div>
  <div style="padding:0 24px 16px;display:grid;grid-template-columns:repeat(2,1fr);font:500 11px/1.3 var(--font-mono);color:var(--fg-2);gap:10px">
    <span>Reverse &middot; white + lime on navy</span><span>Reverse &middot; white on navy</span>
  </div>
</div>
</body></html>
