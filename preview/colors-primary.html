<!doctype html>
<!-- @dsCard group="Brand" name="Primary colors" subtitle="Navy + Lime — the hero pair" viewport="700x260" --><html><head><meta charset="utf-8"><title>Primary Colors</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0;gap:0">
  <div style="display:grid;grid-template-columns:1fr 1fr;height:260px">
    <div style="background:#182D43;color:#FAFAF7;padding:20px;display:flex;flex-direction:column;justify-content:space-between">
      <span style="font:700 11px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:#D2EB00">Primary</span>
      <div>
        <div style="font:700 28px/1 var(--font-sans);letter-spacing:-.02em">Navy</div>
        <div style="font:500 13px/1.4 var(--font-mono);opacity:.75;margin-top:6px">#182D43</div>
        <div style="font:500 11px/1.4 var(--font-mono);opacity:.55;margin-top:2px">--tha-navy</div>
      </div>
    </div>
    <div style="background:#D2EB00;color:#182D43;padding:20px;display:flex;flex-direction:column;justify-content:space-between">
      <span style="font:700 11px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase">Accent</span>
      <div>
        <div style="font:700 28px/1 var(--font-sans);letter-spacing:-.02em">Lime</div>
        <div style="font:500 13px/1.4 var(--font-mono);opacity:.75;margin-top:6px">#D2EB00</div>
        <div style="font:500 11px/1.4 var(--font-mono);opacity:.55;margin-top:2px">--tha-lime</div>
      </div>
    </div>
  </div>
</div>
</body></html>
