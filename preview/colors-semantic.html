<!doctype html>
<!-- @dsCard group="Brand" name="Semantic tokens" subtitle="fg / bg / link tokens" viewport="700x180" --><html><head><meta charset="utf-8"><title>Semantic tokens</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="meta">Semantic tokens</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div style="border:1px solid var(--border-2);padding:10px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;background:#182D43"></div>
      <div><div style="font:600 12px/1 var(--font-mono)">--fg-1</div><div style="font:400 11px/1.3 var(--font-sans);color:var(--fg-2)">Primary text</div></div>
    </div>
    <div style="border:1px solid var(--border-2);padding:10px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;background:#35526F"></div>
      <div><div style="font:600 12px/1 var(--font-mono)">--fg-2</div><div style="font:400 11px/1.3 var(--font-sans);color:var(--fg-2)">Secondary text</div></div>
    </div>
    <div style="border:1px solid var(--border-2);padding:10px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;background:#FAFAF7;border:1px solid #E4E9EF"></div>
      <div><div style="font:600 12px/1 var(--font-mono)">--bg-1</div><div style="font:400 11px/1.3 var(--font-sans);color:var(--fg-2)">Paper surface</div></div>
    </div>
    <div style="border:1px solid var(--border-2);padding:10px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;background:#182D43"></div>
      <div><div style="font:600 12px/1 var(--font-mono)">--bg-dark</div><div style="font:400 11px/1.3 var(--font-sans);color:var(--fg-2)">Hero dark</div></div>
    </div>
    <div style="border:1px solid var(--border-2);padding:10px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;background:#D2EB00"></div>
      <div><div style="font:600 12px/1 var(--font-mono)">--bg-accent</div><div style="font:400 11px/1.3 var(--font-sans);color:var(--fg-2)">Lime hero</div></div>
    </div>
    <div style="border:1px solid var(--border-2);padding:10px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;background:#6103B9"></div>
      <div><div style="font:600 12px/1 var(--font-mono)">--fg-link</div><div style="font:400 11px/1.3 var(--font-sans);color:var(--fg-2)">Link</div></div>
    </div>
  </div>
</div>
</body></html>
