<!doctype html>
<!-- @dsCard group="Brand" name="Lime scale" subtitle="5-step lime — 600 for text on white" viewport="700x180" --><html><head><meta charset="utf-8"><title>Lime Scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="meta">Lime scale — derived</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--border-2)">
    <div style="background:#A7BC00;height:80px"></div>
    <div style="background:#D2EB00;height:80px"></div>
    <div style="background:#DFEF4B;height:80px"></div>
    <div style="background:#EEF7A2;height:80px"></div>
    <div style="background:#FAFCE0;height:80px"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;font:500 11px/1.2 var(--font-mono);color:var(--fg-2)">
    <div>600 · #A7BC00</div><div>500 · #D2EB00</div><div>400 · #DFEF4B</div><div>200 · #EEF7A2</div><div>050 · #FAFCE0</div>
  </div>
  <p style="font:400 12px/1.4 var(--font-sans);color:var(--fg-2);margin:0">Lime 500 is the hero. Use 600 for text/accents on white (WCAG). 050–200 for tints and highlights.</p>
</div>
</body></html>
