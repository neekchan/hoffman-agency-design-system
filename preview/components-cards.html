<!doctype html>
<!-- @dsCard group="Brand" name="Cards" subtitle="Flat-on-paper + dark variant" viewport="700x200" --><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:14px">
  <div class="meta">Cards — flat on paper, hairline border</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="border:1px solid var(--border-2);padding:20px;background:#fff">
      <div style="font:700 11px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:var(--tha-teal)">Case study</div>
      <div style="font:700 22px/1.15 var(--font-sans);letter-spacing:-.02em;margin-top:10px;color:var(--fg-1)">From stealth to <em style="font:400 italic 22px/1.15 var(--font-serif);font-style:italic">front page</em> in six weeks.</div>
      <div style="font:400 13px/1.45 var(--font-sans);color:var(--fg-2);margin-top:8px">Enterprise AI · 412 placements · 38 tier-1</div>
    </div>
    <div style="background:var(--tha-navy);color:#fff;padding:20px;border:1px solid var(--tha-navy)">
      <div style="font:700 11px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:var(--tha-lime)">Service</div>
      <div style="font:700 22px/1.15 var(--font-sans);letter-spacing:-.02em;margin-top:10px">Earned media, <em style="font:400 italic 22px/1.15 var(--font-serif);font-style:italic;color:var(--tha-lime)">actually</em> earned.</div>
      <div style="font:400 13px/1.45 var(--font-sans);color:var(--tha-navy-200);margin-top:8px">Pitches that land. Narratives that travel.</div>
    </div>
  </div>
</div>
</body></html>
