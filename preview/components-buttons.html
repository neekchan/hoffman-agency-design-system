<!doctype html>
<!-- @dsCard group="Brand" name="Buttons" subtitle="Primary, lime, ghost, link" viewport="700x220" --><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .btn{font:600 15px/1 var(--font-sans);padding:14px 22px;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:10px;border-radius:0;letter-spacing:-.005em}
  .btn-primary{background:var(--tha-navy);color:var(--tha-lime)}
  .btn-lime{background:var(--tha-lime);color:var(--tha-navy)}
  .btn-ghost{background:transparent;color:var(--tha-navy);border:1.5px solid var(--tha-navy)}
  .btn-link{background:transparent;border:0;cursor:pointer;color:var(--tha-purple);padding:0;font:600 15px/1 var(--font-sans);border-bottom:1.5px solid var(--tha-purple);padding-bottom:3px}
  .btn .arr{font:400 16px/1 var(--font-sans)}
</style></head>
<body>
<div class="card" style="gap:18px">
  <div class="meta">Buttons — square corners, direct verbs</div>
  <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary">See the work <span class="arr">→</span></button>
    <button class="btn btn-lime">Tell us your story</button>
    <button class="btn btn-ghost">Read the case study</button>
    <button type="button" class="btn-link">Full narrative <span>→</span></button>
  </div>
  <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--border-2);padding-top:16px">
    <div style="font:600 11px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:var(--fg-2);width:100%">Sizes</div>
    <button class="btn btn-primary" style="padding:18px 28px;font-size:17px">Large</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary" style="padding:10px 16px;font-size:13px">Small</button>
  </div>
</div>
</body></html>
