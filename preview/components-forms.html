<!doctype html>
<!-- @dsCard group="Brand" name="Forms" subtitle="Inputs, textarea, tag chips" viewport="700x340" --><html><head><meta charset="utf-8"><title>Forms</title>
<link rel="stylesheet" href="_card.css">
<style>
  .field-input{width:100%;padding:12px 14px;border:1px solid var(--tha-navy-400);border-radius:6px;font:400 15px/1.2 var(--font-sans);background:var(--tha-white);color:var(--fg-1)}
  .field-input:focus-visible{outline:2px solid var(--tha-navy);outline-offset:1px}
</style></head>
<body>
<div class="card" style="gap:16px">
  <div class="meta">Form inputs — 6px radius, 1.5px navy border on focus</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div>
      <label for="f-name" style="font:600 12px/1 var(--font-sans);color:var(--fg-1);display:block;margin-bottom:6px">Full name</label>
      <input id="f-name" class="field-input" placeholder="Jane Doe">
    </div>
    <div>
      <label for="f-email" style="font:600 12px/1 var(--font-sans);color:var(--fg-1);display:block;margin-bottom:6px">Work email</label>
      <input id="f-email" type="email" class="field-input" placeholder="jane@company.com">
    </div>
    <div style="grid-column:1/3">
      <label for="f-story" style="font:600 12px/1 var(--font-sans);color:var(--fg-1);display:block;margin-bottom:6px">What's the story?</label>
      <textarea id="f-story" rows="3" class="field-input" style="resize:none" placeholder="One sentence. We'll reply with two."></textarea>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border-2);padding-top:14px">
    <span style="font:600 12px/1 var(--font-sans);padding:6px 12px;background:var(--tha-lime);color:var(--tha-navy);border-radius:999px">Earned</span>
    <span style="font:600 12px/1 var(--font-sans);padding:6px 12px;background:transparent;color:var(--tha-navy);border:1px solid var(--border-1);border-radius:999px">Digital</span>
    <span style="font:600 12px/1 var(--font-sans);padding:6px 12px;background:transparent;color:var(--tha-navy);border:1px solid var(--border-1);border-radius:999px">Content</span>
    <span style="font:600 12px/1 var(--font-sans);padding:6px 12px;background:transparent;color:var(--tha-navy);border:1px solid var(--border-1);border-radius:999px">AI</span>
  </div>
</div>
</body></html>
