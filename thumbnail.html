<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Preview icon for the design-system listing. Pulls the system's real tokens. -->
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .thumb {
    width: 1280px;
    height: 854px;
    display: flex;
    overflow: hidden;
    font-family: var(--font-sans);
  }
  /* Left ~75%: the wordmark on a brand-token background */
  .thumb__main {
    flex: 0 0 75%;
    box-sizing: border-box;
    background: var(--tha-navy);
    display: flex;
    align-items: flex-end;
    padding: 80px;
  }
  .thumb__name {
    margin: 0;
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 156px;
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--tha-lime);
  }
  /* Right ~25%: stacked swatches from real color tokens (accents + dark neutral) */
  .thumb__swatches {
    flex: 0 0 25%;
    display: flex;
    flex-direction: column;
  }
  .thumb__swatch { flex: 1; }
</style>
</head>
<body>
  <div class="thumb">
    <div class="thumb__main">
      <h1 class="thumb__name">Hoffman<br>Agency</h1>
    </div>
    <div class="thumb__swatches">
      <div class="thumb__swatch" style="background: var(--tha-lime);"></div>
      <div class="thumb__swatch" style="background: var(--tha-violet);"></div>
      <div class="thumb__swatch" style="background: var(--tha-aqua);"></div>
      <div class="thumb__swatch" style="background: var(--tha-navy-900);"></div>
    </div>
  </div>
</body>
</html>
