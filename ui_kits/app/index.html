<!doctype html>
<!-- @dsCard group="UI Kit - App" name="App UI Kit - product dashboard" subtitle="Forms, navigation, feedback, data, disclosure, progress" viewport="1440x900" -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hoffman Agency - App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/mark-square-lime.png">
<style>
  html, body { margin: 0; min-height: 100%; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); }
  * { box-sizing: border-box; }
  button, input, textarea, select { font-family: inherit; }
  button:hover { filter: brightness(1.03); }
  a:hover { opacity: .78; }
  @keyframes tha-spin { to { transform: rotate(360deg); } }
  .app-shell { min-height: 100vh; display: grid; grid-template-columns: 232px minmax(0, 1fr); background: var(--bg-1); }
  .app-main { min-width: 0; display: grid; grid-template-rows: auto 1fr; }
  .topbar { min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 0 28px; background: var(--tha-white); border-bottom: 1px solid var(--border-2); }
  .content { padding: 28px; display: grid; gap: 24px; }
  .panel { background: var(--tha-white); border: 1px solid var(--border-2); padding: 20px; }
  .panel-title { margin: 0 0 16px; font: 700 18px/1.2 var(--font-sans); color: var(--fg-1); }
  .grid-2 { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr); gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
  .stat { background: var(--tha-white); border: 1px solid var(--border-2); padding: 16px; min-height: 108px; }
  .stat b { display: block; font: 800 34px/1 var(--font-sans); letter-spacing: var(--track-tight); color: var(--tha-navy); }
  .stat span { display: block; margin-top: 8px; font: 500 12px/1.3 var(--font-sans); color: var(--fg-2); }
  @media (max-width: 920px) {
    .app-shell { grid-template-columns: 1fr; }
    .app-shell aside { display: none !important; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .content { padding: 18px; }
    .topbar { padding: 0 18px; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="tha">
<div id="root"></div>

<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
const { useState } = React;
const NS = window.HoffmanAgencyDesignSystem_d10f7f || {};
const pick = name => NS[name] || window[name];
const {
  AppButton, TextField, TextareaField, SelectField, DateField, FileField,
  SliderField, Checkbox, RadioGroup, Toggle, Tabs, Breadcrumbs, Pagination,
  Sidebar, MobileMenu, AlertBanner, Toast, Modal, Tooltip, Popover, DataTable,
  DataList, Avatar, Badge, Divider, Accordion, Drawer, Menu, ProgressBar,
  Spinner, Skeleton,
} = Object.fromEntries([
  'AppButton','TextField','TextareaField','SelectField','DateField','FileField',
  'SliderField','Checkbox','RadioGroup','Toggle','Tabs','Breadcrumbs','Pagination',
  'Sidebar','MobileMenu','AlertBanner','Toast','Modal','Tooltip','Popover','DataTable',
  'DataList','Avatar','Badge','Divider','Accordion','Drawer','Menu','ProgressBar',
  'Spinner','Skeleton'
].map(name => [name, pick(name)]));

function App() {
  const [section, setSection] = useState('accounts');
  const [modalOpen, setModalOpen] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [budget, setBudget] = useState(62);
  const [priority, setPriority] = useState('earned');
  const navItems = [
    { key: 'accounts', label: 'Accounts' },
    { key: 'campaigns', label: 'Campaigns' },
    { key: 'briefs', label: 'Briefs' },
    { key: 'reports', label: 'Reports' },
  ];
  const columns = [
    { key: 'account', label: 'Account' },
    { key: 'owner', label: 'Owner' },
    { key: 'stage', label: 'Stage' },
    { key: 'health', label: 'Health' },
  ];
  const rows = [
    { account: 'NovaGraph', owner: 'M. Lee', stage: <Badge tone="accent">Launch</Badge>, health: <Badge tone="success">Strong</Badge> },
    { account: 'DeepFrame', owner: 'A. Singh', stage: <Badge>Briefing</Badge>, health: <Badge tone="warning">Watch</Badge> },
    { account: 'Cloudway', owner: 'J. Chen', stage: <Badge tone="info">Reporting</Badge>, health: <Badge tone="success">Clear</Badge> },
  ];

  return (
    <div className="app-shell">
      <Sidebar items={navItems} activeKey={section} onNavigate={setSection} />
      <main className="app-main">
        <header className="topbar">
          <div>
            <Breadcrumbs items={[{ label: 'Client portal' }, { label: 'Accounts' }, { label: 'NovaGraph' }]} />
            <h1 style={{ margin: '8px 0 0', font: '800 26px/1.12 var(--font-sans)', letterSpacing: 'var(--track-tight)' }}>Campaign command center</h1>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <MobileMenu label="Menu" items={[{ label: 'Accounts' }, { label: 'Reports' }, { label: 'Settings' }]} />
            <Popover
              title="Review queue"
              trigger={<AppButton variant="neutral" size="sm">Queue</AppButton>}
            >
              Three items need approval before Friday.
            </Popover>
            <Tooltip label="Open drawer"><AppButton variant="ghost" size="sm" onClick={() => setDrawerOpen(true)}>Details</AppButton></Tooltip>
            <AppButton size="sm" onClick={() => setModalOpen(true)}>New brief</AppButton>
            <Avatar name="Takeo Hoffman" />
          </div>
        </header>

        <section className="content">
          <AlertBanner tone="info" title="Weekly report draft is ready">
            Check quotes, proof points, and final coverage before sharing with the client.
          </AlertBanner>

          <div className="grid-3">
            <div className="stat"><b>38</b><span>Tier-1 placements tracked</span></div>
            <div className="stat"><b>4.2M</b><span>Estimated audience reach</span></div>
            <div className="stat"><b>91%</b><span>Message pull-through</span></div>
          </div>

          <div className="grid-2">
            <section className="panel">
              <Tabs tabs={[{ key: 'pipeline', label: 'Pipeline' }, { key: 'activity', label: 'Activity' }, { key: 'assets', label: 'Assets' }]} defaultKey="pipeline" />
              <div style={{ height: 16 }} />
              <DataTable columns={columns} rows={rows} />
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 16 }}>
                <Pagination page={2} total={4} />
                <Menu label="Actions" items={[{ label: 'Export CSV' }, { label: 'Archive account' }, { label: 'Delete', danger: true }]} />
              </div>
            </section>

            <aside style={{ display: 'grid', gap: 16 }}>
              <section className="panel">
                <h2 className="panel-title">Brief setup</h2>
                <div style={{ display: 'grid', gap: 14 }}>
                  <TextField label="Brief name" placeholder="Q3 launch narrative" />
                  <SelectField label="Region" defaultValue="apac" options={[{ label: 'APAC', value: 'apac' }, { label: 'US', value: 'us' }, { label: 'EMEA', value: 'emea' }]} />
                  <DateField label="Target date" defaultValue="2026-07-17" />
                  <FileField label="Source file" helper="PDF, DOCX, or CSV" />
                  <SliderField label="Budget confidence" value={budget} onChange={event => setBudget(event.target.value)} />
                  <RadioGroup label="Priority channel" name="priority" value={priority} onChange={event => setPriority(event.target.value)} options={[{ label: 'Earned media', value: 'earned' }, { label: 'Social', value: 'social' }]} />
                  <Checkbox label="Notify account team" defaultChecked />
                  <Toggle label="Client-visible draft" defaultChecked />
                </div>
              </section>
            </aside>
          </div>

          <div className="grid-2">
            <section className="panel">
              <h2 className="panel-title">Account detail</h2>
              <DataList items={[
                { label: 'Lead', value: 'M. Lee' },
                { label: 'Market', value: 'Enterprise AI' },
                { label: 'Next action', value: 'Approve spokesperson quote' },
              ]} />
              <Divider label="Workflow" style={{ margin: '18px 0' }} />
              <Accordion items={[
                { title: 'Coverage review', content: 'Three clips are waiting for sentiment and message pull-through checks.' },
                { title: 'Spokesperson prep', content: 'Media training notes are approved. Final talking points need client review.' },
              ]} />
            </section>

            <section className="panel">
              <h2 className="panel-title">Status and loading states</h2>
              <div style={{ display: 'grid', gap: 16 }}>
                <Toast tone="success" title="Saved">The client brief is synced to the campaign workspace.</Toast>
                <ProgressBar label="Launch readiness" value={74} />
                <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                  <Spinner label="Refreshing" />
                  <Skeleton lines={3} style={{ flex: 1 }} />
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>

      <Modal
        open={modalOpen}
        title="Create brief"
        onClose={() => setModalOpen(false)}
        footer={<><AppButton variant="neutral" onClick={() => setModalOpen(false)}>Cancel</AppButton><AppButton onClick={() => setModalOpen(false)}>Create</AppButton></>}
      >
        <div style={{ display: 'grid', gap: 14 }}>
          <TextField label="Client" placeholder="NovaGraph" />
          <TextareaField label="What changed?" placeholder="One clear shift in the market, customer, or client need." />
        </div>
      </Modal>

      <Drawer open={drawerOpen} title="NovaGraph details" onClose={() => setDrawerOpen(false)}>
        <DataList items={[
          { label: 'Owner', value: 'M. Lee' },
          { label: 'Health', value: 'Strong' },
          { label: 'Budget', value: '$84k' },
        ]} />
      </Drawer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
